<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史考試課題範圍</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .container {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .volume {
            margin-bottom: 40px;
        }
        .volume-header {
            color: #2980b9;
            border-bottom: 3px solid #3498db;
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .topic-list {
            list-style-type: none;
            padding-left: 0;
        }
        .topic-item {
            padding: 14px 20px;
            margin: 12px 0;
            background-color: #f8f9fa;
            border-left: 5px solid #3498db;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }
        .topic-item:hover {
            background-color: #e3f2fd;
            transform: translateX(8px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
        }
        .topic-number {
            font-weight: bold;
            color: #2980b9;
            min-width: 30px;
            margin-right: 15px;
        }
        .topic-text {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>歷史考試課題範圍</h1>
        
        <!-- 卷一甲部 -->
        <div class="volume">
            <h2 class="volume-header">卷一甲部</h2>
            <ul class="topic-list">
                <li class="topic-item">
                    <span class="topic-number">1.</span>
                    <span class="topic-text">周代分封</span>
                </li>
                <li class="topic-item">
                    <span class="topic-number">2.</span>
                    <span class="topic-text">春秋戰國政治與社會變動</span>
                </li>
                <li class="topic-item">
                    <span class="topic-number">3.</span>
                    <span class="topic-text">安史之亂與唐代衰亡</span>
                </li>
                <li class="topic-item">
                    <span class="topic-number">4.</span>
                    <span class="topic-text">宋元的中央集權</span>
                </li>
                <li class="topic-item">
                    <span class="topic-number">5.</span>
                    <span class="topic-text">明清的君主集權</span>
                </li>
            </ul>
        </div>

        <!-- 卷一乙部 -->
        <div class="volume">
            <h2 class="volume-header">卷一乙部</h2>
            <ul class="topic-list">
                <li class="topic-item">
                    <span class="topic-number">1.</span>
                    <span class="topic-text">改革與革命</span>
                </li>
                <li class="topic-item">
                    <span class="topic-number">2.</span>
                    <span class="topic-text">國共分合</span>
                </li>
                <li class="topic-item">
                    <span class="topic-number">3.</span>
                    <span class="topic-text">國共和談與內戰</span>
                </li>
                <li class="topic-item">
                    <span class="topic-number">4.</span>
                    <span class="topic-text">社會主義建設</span>
                </li>
                <li class="topic-item">
                    <span class="topic-number">5.</span>
                    <span class="topic-text">「文化大革命」</span>
                </li>
                <li class="topic-item">
                    <span class="topic-number">6.</span>
                    <span class="topic-text">對外關係</span>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
